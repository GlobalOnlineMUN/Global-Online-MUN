<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GOMUN Portal Login</title>
  <link rel="stylesheet" href="style.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body class="login-body">
  <div class="login-wrapper">
    <div class="login-card">
      <h1 id="authTitle">GOMUN Login</h1>
      <p class="subtitle">Global Online Model United Nations</p>
      
      <form id="authForm" class="login-form">
        <div id="adminFields" style="display:none; margin-bottom: 15px;">
          <select id="role" style="width: 100%; padding: 10px; border-radius: 8px;">
            <option value="user">Login as User</option>
            <option value="admin">Login as Admin</option>
          </select>
        </div>

        <input type="text" id="username" placeholder="Username" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit" id="authBtn">Login</button>
      </form>

      <p id="error" class="error"></p>
      
      <p class="hint" style="margin-top: 20px;">
        <span id="toggleText">Don't have an account?</span> 
        <a href="#" id="toggleAuth" style="color: #1D4ED8; font-weight: bold; text-decoration: none;">Sign Up</a>
      </p>
    </div>
  </div>
  <script src="auth.js"></script>
</body>
</html>
