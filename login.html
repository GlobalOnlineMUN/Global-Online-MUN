<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GOMUN Portal | Login</title>
  <link rel="stylesheet" href="style.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body class="login-body">
  <div class="login-wrapper">
    <div class="login-card">
      <h1 id="authTitle">GOMUN Portal</h1>
      <p class="subtitle" id="authSubtitle">Access the GOMUN Academy</p>
      
      <form id="loginForm" class="login-form">
        <input type="text" id="username" placeholder="Username" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit" id="authBtn">Login</button>
      </form>

      <p id="error" class="error"></p>
      <div class="auth-toggle">
        <p id="toggleText">Don't have an account? <span onclick="toggleAuth()">Sign Up</span></p>
      </div>
      <p class="hint">Authorized delegates only</p>
    </div>
  </div>
  <script src="auth.js"></script>
</body>
</html>
