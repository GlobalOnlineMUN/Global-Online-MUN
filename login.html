<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GOMUN Portal Login</title>
  <link rel="stylesheet" href="style.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body class="login-body">
  <div class="login-card">
  <h1 id="authTitle">GOMUN Login</h1>
  <form id="authForm" class="login-form">
    <input type="text" id="username" placeholder="Username" required />
    <input type="password" id="password" placeholder="Password" required />
    
    <div id="adminFields" style="display:none;">
      <select id="role">
        <option value="user">User</option>
        <option value="admin">Admin</option>
      </select>
    </div>

    <button type="submit" id="authBtn">Login</button>
  </form>
  
  <p class="hint">
    <span id="toggleText">Don't have an account?</span> 
    <a href="#" id="toggleAuth" style="color: #1D4ED8; font-weight: bold;">Sign Up</a>
  </p>
  <p id="error" class="error"></p>
</div> 
  <script src="auth.js"></script>
</body>
</html>
