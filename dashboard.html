<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GOMUN Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <script>
    // 1. ACCESS CONTROL: Only 'admin' can stay here
    const role = localStorage.getItem("gomunRole");
    if (!role) {
      window.location.href = "login.html";
    } else if (role !== "admin") {
      alert("Access Denied: Admins Only.");
      window.location.href = "index.html"; 
    }
  </script>
</head>
<body>

<nav>
  <div class="logo">GOMUN</div>
  <div class="links">
    <a href="index.html">Home</a>
    <a href="academy.html">Academy</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="certificates.html">Certificates</a>
    <button onclick="logout()" class="btn-logout">Logout</button>
  </div>
</nav>

<section id="dashboard">
  <h2>Participant Dashboard</h2>
  <p class="center">Admin panel to manage GOMUN Academy participants.</p>

  <div style="overflow-x: auto; margin-top: 20px;">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Current Module</th> <th>Exam Score</th>     <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="participantsTable">
        </tbody>
    </table>
  </div>
</section>

<script>
  function logout() {
    localStorage.removeItem("gomunRole");
    localStorage.removeItem("username"); // Clear session
    window.location.href = "login.html";
  }
</script>

<script src="script.js"></script>
</body>
</html>
