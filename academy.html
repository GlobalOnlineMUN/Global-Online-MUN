<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Academy | GOMUN</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav>
    <div class="logo">GOMUN</div>
    <div class="links"><a href="index.html">Home</a><a href="academy.html">Academy</a><button onclick="logout()" class="btn-logout">Logout</button></div>
  </nav>

  <section class="academy-layout">
    <div class="info-side">
      <h2>GOMUN Academy</h2>
      <p>A structured program for beginners to master MUN procedures.</p>
      <ul>
        <li>7-10 Days Duration</li>
        <li>Online Live Sessions</li>
        <li>Certified Training</li>
      </ul>
    </div>

    <div class="form-card">
      <h3>Register</h3>
      <form id="registerForm">
        <input type="text" id="fullName" placeholder="Full Name" required />
        <input type="email" id="email" placeholder="Email Address" required />
        <input type="text" id="school" placeholder="School/University" required />
        <select id="experience">
          <option>Beginner</option>
          <option>Intermediate</option>
        </select>
        <textarea id="reason" placeholder="Why join?"></textarea>
        <button type="submit">Submit Registration</button>
      </form>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
